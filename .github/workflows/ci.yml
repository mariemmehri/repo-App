name: CI — Build, Test & Push to ACR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# ─── Global env ────────────────────────────────────────────────
env:
  BACKEND_IMAGE: todo-backend
  FRONTEND_IMAGE: todo-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Backend : compile + test + upload JAR (build once)
  # ═══════════════════════════════════════════════════════════════
  backend-ci:
    name: 🔧 Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: 🧪 Build + Tests
        run: mvn verify -q

      - name: 📊 Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: 📦 Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Frontend : lint + build + upload dist (build once)
  # ═══════════════════════════════════════════════════════════════
  frontend-ci:
    name: 🎨 Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: 📥 npm install
        run: npm install --legacy-peer-deps

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build Angular
        run: npm run build

      - name: 📦 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Docker Build & Push → ACR  (push uniquement)
  # ═══════════════════════════════════════════════════════════════
  docker-build-push:
    name: 🐳 Docker Build & Push → ACR
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: 📦 Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # ── Plan B : ACR admin credentials ──────────────────────────
      # Limitation : student subscription Azure sans Service Principal
      # En production → remplacer par OIDC + Managed Identity fédérée :
      #   azure/login@v2 avec client-id / tenant-id / subscription-id
      #   + az acr login --name <ACR_NAME>
      # ─────────────────────────────────────────────────────────────
      - name: 🔐 Login ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 🧹 Normalize ACR login server
        id: normalize
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="${REGISTRY%/}"

          if [ -z "$REGISTRY" ]; then
            echo "❌ ACR_LOGIN_SERVER is empty after normalization"
            exit 1
          fi

          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: 🛡️ Scan vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1

      - name: 🐳 Build & Push Backend
        run: |
          docker build \
            -t ${{ steps.normalize.outputs.registry }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.normalize.outputs.registry }}/${{ env.BACKEND_IMAGE }}:latest \
            ./backend

          docker push ${{ steps.normalize.outputs.registry }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.normalize.outputs.registry }}/${{ env.BACKEND_IMAGE }}:latest

      - name: 🐳 Build & Push Frontend
        run: |
          docker build \
            -t ${{ steps.normalize.outputs.registry }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.normalize.outputs.registry }}/${{ env.FRONTEND_IMAGE }}:latest \
            ./frontend

          docker push ${{ steps.normalize.outputs.registry }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.normalize.outputs.registry }}/${{ env.FRONTEND_IMAGE }}:latest

      # ═══════════════════════════════════════════════════════════
      # GitOps — Update Config Repo (inchangé)
      # ═══════════════════════════════════════════════════════════
      - name: 📦 Install yq (version fixe)
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

      - name: 🔄 Update image tags in Config Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_REPO: mariemmehri/repo-config
          VALUES_FILE: charts/todo-app/values-staging.yaml
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_USER_NAME: "github-actions[bot]"
        run: |
          set -euo pipefail

          git clone \
            https://x-access-token:${GH_PAT}@github.com/${CONFIG_REPO}.git \
            config-repo
          cd config-repo

          yq e ".backend.image.tag  = \"${IMAGE_TAG}\"" -i ${VALUES_FILE}
          yq e ".frontend.image.tag = \"${IMAGE_TAG}\"" -i ${VALUES_FILE}

          echo "🔍 Verifying..."
          grep "tag:" ${VALUES_FILE}

          git config user.email "${GIT_USER_EMAIL}"
          git config user.name  "${GIT_USER_NAME}"
          git add ${VALUES_FILE}

          if git diff --cached --quiet; then
            echo "⚠️  No changes — tag already up to date"
            exit 0
          fi

          git commit -m "ci: update image tags to ${IMAGE_TAG}

          Triggered by : ${GITHUB_REPOSITORY}@${GITHUB_SHA}
          Branch       : ${GITHUB_REF_NAME}
          Workflow     : ${GITHUB_WORKFLOW}"

          git push
          echo "✅ Done"