name: CI — Build & Push to ACR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE: todo-backend
  FRONTEND_IMAGE: todo-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ═══════════════════════════════════════════════════════
  # JOB 1 — Backend CI
  # ═══════════════════════════════════════════════════════
  backend-ci:
    name: 🔧 Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 📦 Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: 🧪 Build + Tests
        run: mvn verify -q

      - name: 📊 Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/target/surefire-reports/
          retention-days: 7

  # ═══════════════════════════════════════════════════════
  # JOB 2 — Frontend CI
  # ═══════════════════════════════════════════════════════
  frontend-ci:
    name: 🎨 Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: 📥 npm install
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build Angular
        run: npm run build

  # ═══════════════════════════════════════════════════════
  # JOB 3 — Docker Build & Push + Config Update
  # ═══════════════════════════════════════════════════════
  docker-build-push:
    name: 🐳 Docker Build & Push → ACR
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 🐳 Build & Push Backend
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            ./backend
          docker push \
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: 🐳 Build & Push Frontend
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            ./frontend
          docker push \
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: 🔄 Update image tag in Config Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          IMAGE_TAG: ${{ github.sha }}
          CONFIG_REPO: mariemmehri/repo-config
          VALUES_FILE: charts/todo-app/values-staging.yaml
          GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_USER_NAME: "github-actions[bot]"
        run: |
          set -euo pipefail

          # ── Install yq ──────────────────────────────────
          echo "📦 Installing yq..."
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

          # ── Clone Config Repo ────────────────────────────
          echo "📥 Cloning config repo..."
          git clone \
            https://x-access-token:${GH_PAT}@github.com/${CONFIG_REPO}.git \
            config-repo
          cd config-repo

          # ── Update tags ──────────────────────────────────
          echo "✏️  Updating image tags to ${IMAGE_TAG}..."
          yq e ".backend.image.tag = \"${IMAGE_TAG}\"" -i ${VALUES_FILE}
          yq e ".frontend.image.tag = \"${IMAGE_TAG}\"" -i ${VALUES_FILE}

          # ── Verify ───────────────────────────────────────
          echo "🔍 Verifying changes..."
          grep "tag:" ${VALUES_FILE}

          # ── Commit & Push ────────────────────────────────
          git config user.email "${GIT_USER_EMAIL}"
          git config user.name "${GIT_USER_NAME}"
          git add ${VALUES_FILE}

          if git diff --cached --quiet; then
            echo "⚠️  No changes — tag already up to date"
            exit 0
          fi

          git commit -m "ci: update image tags to ${IMAGE_TAG}

          Triggered by: ${GITHUB_REPOSITORY}@${GITHUB_SHA}
          Branch: ${GITHUB_REF_NAME}
          Workflow: ${GITHUB_WORKFLOW}"

          git push
          echo "✅ Done"