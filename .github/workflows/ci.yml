name: CI Pipeline

# Trigger on push to main or any pull request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build & Test Backend (Spring Boot)
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Optional: Run tests if you have them
      # - name: Run Tests
      #   run: mvn test

  # Job 2: Build Use Frontend (Angular)
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run build -- --configuration production

      # Optional: Run Frontend Tests
      # - name: Run Tests
      #   run: npm test -- --watch=false --browsers=ChromeHeadless

  # Job 3: Verify Docker Build (Optional but Recommended)
  docker-check:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build] # Runs after backend/frontend pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker compose build