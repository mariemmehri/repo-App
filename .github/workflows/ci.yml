    #     run: |
    #       echo "============================================"
    #       echo "  Images publiées sur ACR"
    #       echo "============================================"
    #   echo "  Backend  : {{ env.ACR_LOGIN_SERVER }}/{{ env.BACKEND_IMAGE }}:{{ env.IMAGE_TAG }}"
    #   echo "  Frontend : {{ env.ACR_LOGIN_SERVER }}/{{ env.FRONTEND_IMAGE }}:{{ env.IMAGE_TAG }}"
    #       echo ""
    #       echo "  Prochain step GitOps :"
    #       echo "  → Mettre à jour le Config Repo avec ce SHA"
    #       echo "  → ArgoCD détecte le changement et déploie automatiquement"
    #       echo "============================================"
